#
# GitHub Actions Build System - LogApi
#
name: Action Build System
on: [push]
env:
  CONTAINER: ubuntu:18.04

jobs:
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Start Docker Container
      run: |
        docker pull $CONTAINER
        docker run --name build-container -d -v ${{github.workspace}}:/workspace $CONTAINER tail -f /dev/null

    - name: Install Development Tools Packages
      env:
        SCRIPT: |
          dpkg --add-architecture i386
          apt-get update > /dev/null 2>&1
          apt-get install -qq -y pkg-config wget unzip build-essential gcc-multilib g++-multilib \
          libgcc1:i386 zlib1g-dev:i386 > /dev/null 2>&1
          echo "✓ Packages installed"
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Build libcurl 32-bit Static
      env:
        SCRIPT: |
          cd /tmp
          echo "Downloading curl..."
          wget -q https://curl.se/download/curl-8.7.1.tar.gz
          tar xf curl-8.7.1.tar.gz
          cd curl-8.7.1
          echo "Configuring curl..."
          ./configure --host=i686-linux-gnu \
            CFLAGS="-m32" LDFLAGS="-m32" \
            --disable-gssapi \
            --disable-kerberos5 \
            --disable-ntlm \
            --without-gssapi \
            --without-ssl \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/curl32 \
            --silent
          echo "Building curl..."
          make -j$(nproc) --silent
          make install --silent
          echo "✓ libcurl built successfully"
          ls -la /usr/local/curl32/lib/
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Execute Build
      env:
        SCRIPT: |
          echo "=== Starting Build ==="
          cd /workspace
          
          echo "=== Directory Structure ==="
          ls -la
          
          echo "=== Checking Makefile ==="
          if [ -f Makefile ]; then
            echo "✓ Makefile found"
          else
            echo "✗ Makefile NOT found!"
            exit 1
          fi
          
          echo "=== Cleaning ==="
          make clean || true
          
          echo "=== Building ==="
          make
          
          echo "=== Build Result ==="
          ls -la Release/ || echo "Release folder not found!"
          
          if [ -f Release/logapi_mm.so ]; then
            echo "✓ logapi_mm.so generated successfully"
            echo "=== Library Dependencies ==="
            ldd Release/logapi_mm.so || true
          else
            echo "✗ logapi_mm.so NOT generated!"
            exit 1
          fi
          
          echo "=== Creating Publish Structure ==="
          mkdir -p /workspace/publish/addons/logapi/dlls
          cp Release/logapi_mm.so publish/addons/logapi/dlls/
          
          echo "=== Publish Contents ==="
          ls -la publish/addons/logapi/dlls/
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux32
        path: ${{github.workspace}}/publish
        retention-days: 30
        if-no-files-found: error
        
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Check Directory Structure
      run: |
        echo "=== Workspace Contents ==="
        dir ${{github.workspace}}
        echo "=== Looking for .vcxproj ==="
        dir /s *.vcxproj
      shell: cmd

    - name: Execute Build
      run: |
        # Find the .vcxproj file
        $vcxproj = Get-ChildItem -Recurse -Filter "*.vcxproj" | Select-Object -First 1
        if ($vcxproj) {
          Write-Host "✓ Found: $($vcxproj.FullName)"
          $projectDir = $vcxproj.DirectoryName
        } else {
          Write-Host "✗ No .vcxproj found!"
          exit 1
        }
        
        # Build
        Write-Host "=== Building ==="
        msbuild $vcxproj.FullName -property:Configuration=Release -nologo -verbosity:minimal
        
        # Find the output DLL
        $dll = Get-ChildItem -Recurse -Filter "logapi_mm.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($dll) {
          Write-Host "✓ Found: $($dll.FullName)"
        } else {
          Write-Host "✗ logapi_mm.dll NOT generated!"
          exit 1
        }
        
        # Create publish structure
        Write-Host "=== Creating Publish Structure ==="
        New-Item -ItemType Directory -Force -Path publish\addons\logapi\dlls | Out-Null
        Copy-Item $dll.FullName publish\addons\logapi\dlls\ -Force
        
        # Show contents
        Write-Host "=== Publish Contents ==="
        Get-ChildItem -Recurse publish\
      shell: pwsh

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: win32
        path: ${{github.workspace}}/publish
        retention-days: 30
        if-no-files-found: error

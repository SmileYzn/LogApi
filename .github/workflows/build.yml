#
# GitHub Actions Build System - LogApi
#
name: Action Build System
on: [push]
env:
  CONTAINER: ubuntu:18.04

jobs:
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Check Repository Structure
      run: |
        echo "=== Repository Root Contents ==="
        ls -la ${{github.workspace}}/
        echo "=== LogApi Folder Contents ==="
        ls -la ${{github.workspace}}/LogApi/ 2>/dev/null || echo "LogApi folder not found"
        echo "=== Looking for config files in LogApi/ ==="
        ls -la ${{github.workspace}}/LogApi/events.json 2>/dev/null || echo "events.json not found"
        ls -la ${{github.workspace}}/LogApi/logapi.cfg 2>/dev/null || echo "logapi.cfg not found"
        ls -la ${{github.workspace}}/LogApi/LogApi.php 2>/dev/null || echo "LogApi.php not found"

    - name: Start Docker Container
      run: |
        docker pull $CONTAINER
        docker run --name build-container -d -v ${{github.workspace}}:/src $CONTAINER tail -f /dev/null

    - name: Install Development Tools Packages
      run: |
        docker exec build-container bash -c "
          dpkg --add-architecture i386
          apt-get update
          apt-get install -qq -y pkg-config wget unzip build-essential gcc-multilib g++-multilib libgcc1:i386 zlib1g-dev:i386
        "

    - name: Build libcurl 32-bit Static
      run: |
        docker exec build-container bash -c "
          cd /tmp
          wget -q https://curl.se/download/curl-8.7.1.tar.gz
          tar xf curl-8.7.1.tar.gz
          cd curl-8.7.1
          ./configure --host=i686-linux-gnu CFLAGS='-m32' LDFLAGS='-m32' --disable-gssapi --disable-kerberos5 --disable-ntlm --without-gssapi --without-ssl --disable-shared --enable-static --prefix=/usr/local/curl32
          make -j\$(nproc)
          make install
        "

    - name: Execute Build
      run: |
        docker exec build-container bash -c "
          cd /src/LogApi
          echo '=== Cleaning ==='
          make clean || true
          echo '=== Building ==='
          make
          echo '=== Build Result ==='
          ls -la Release/
          echo '=== Dependencies ==='
          ldd Release/logapi_mm.so 2>&1 || true
        "

    - name: Prepare Linux Artifact
      run: |
        # Create artifact structure
        mkdir -p ${{github.workspace}}/artifacts/addons/logapi/dlls
        mkdir -p ${{github.workspace}}/artifacts/addons/logapi/config
        mkdir -p ${{github.workspace}}/artifacts/addons/logapi/php
        
        # Copy compiled module from Docker
        docker cp build-container:/src/LogApi/Release/logapi_mm.so ${{github.workspace}}/artifacts/addons/logapi/dlls/
        echo "✓ logapi_mm.so copied"
        
        # Copy config files from LogApi/ folder
        if [ -f "${{github.workspace}}/LogApi/events.json" ]; then
          cp ${{github.workspace}}/LogApi/events.json ${{github.workspace}}/artifacts/addons/logapi/config/
          echo "✓ events.json copied"
        else
          echo "⚠ events.json NOT FOUND in LogApi/"
          echo '{"events":[]}' > ${{github.workspace}}/artifacts/addons/logapi/config/events.json
        fi
        
        if [ -f "${{github.workspace}}/LogApi/logapi.cfg" ]; then
          cp ${{github.workspace}}/LogApi/logapi.cfg ${{github.workspace}}/artifacts/addons/logapi/config/
          echo "✓ logapi.cfg copied"
        else
          echo "⚠ logapi.cfg NOT FOUND in LogApi/"
          echo '// LogApi Config' > ${{github.workspace}}/artifacts/addons/logapi/config/logapi.cfg
        fi
        
        if [ -f "${{github.workspace}}/LogApi/LogApi.php" ]; then
          cp ${{github.workspace}}/LogApi/LogApi.php ${{github.workspace}}/artifacts/addons/logapi/php/
          echo "✓ LogApi.php copied"
        else
          echo "⚠ LogApi.php NOT FOUND in LogApi/"
          echo '<?php // LogApi PHP Handler ?>' > ${{github.workspace}}/artifacts/addons/logapi/php/LogApi.php
        fi
        
        # Show final artifact contents
        echo "=== Final Artifact Contents ==="
        find ${{github.workspace}}/artifacts -type f

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux32
        path: ${{github.workspace}}/artifacts
        retention-days: 30
        if-no-files-found: error

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Check Repository Structure
      run: |
        Write-Host "=== Repository Root Contents ==="
        Get-ChildItem ${{github.workspace}} | Select-Object Name
        Write-Host "=== LogApi Folder Contents ==="
        Get-ChildItem ${{github.workspace}}\LogApi 2>$null | Select-Object Name
        Write-Host "=== Looking for config files ==="
        if (Test-Path "${{github.workspace}}\LogApi\events.json") { Write-Host "✓ events.json found" } else { Write-Host "✗ events.json not found" }
        if (Test-Path "${{github.workspace}}\LogApi\logapi.cfg") { Write-Host "✓ logapi.cfg found" } else { Write-Host "✗ logapi.cfg not found" }
        if (Test-Path "${{github.workspace}}\LogApi\LogApi.php") { Write-Host "✓ LogApi.php found" } else { Write-Host "✗ LogApi.php not found" }
      shell: pwsh

    - name: Find and Build Project
      id: build
      run: |
        $project = Get-ChildItem -Recurse -Filter "*.vcxproj" | Select-Object -First 1
        if (!$project) {
          Write-Error "No .vcxproj found!"
          exit 1
        }
        Write-Host "Found project: $($project.FullName)"
        
        msbuild $project.FullName -property:Configuration=Release -property:Platform=Win32 -nologo -verbosity:minimal
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Build failed!"
          exit 1
        }
        
        $dll = Get-ChildItem -Recurse -Filter "logapi_mm.dll" | Select-Object -First 1
        if (!$dll) {
          Write-Error "logapi_mm.dll not found!"
          exit 1
        }
        Write-Host "Found DLL: $($dll.FullName)"
        
        echo "dll_path=$($dll.FullName)" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Prepare Windows Artifact
      run: |
        # Create artifact structure
        New-Item -ItemType Directory -Force -Path artifacts\addons\logapi\dlls | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts\addons\logapi\config | Out-Null
        New-Item -ItemType Directory -Force -Path artifacts\addons\logapi\php | Out-Null
        
        # Copy compiled module
        Copy-Item "${{ steps.build.outputs.dll_path }}" artifacts\addons\logapi\dlls\logapi_mm.dll -Force
        Write-Host "✓ logapi_mm.dll copied"
        
        # Copy config files from LogApi/ folder
        if (Test-Path "LogApi/events.json") {
          Copy-Item "LogApi/events.json" artifacts\addons\logapi\events.json -Force
          Write-Host "✓ events.json copied"
        } else {
          Write-Host "⚠ events.json NOT FOUND - creating placeholder"
          '{"events":[]}' | Out-File -FilePath artifacts\addons\logapi\events.json -Encoding UTF8
        }

        if (Test-Path "LogApi/logapi.cfg") {
          Copy-Item "LogApi/logapi.cfg" artifacts\addons\logapi\logapi.cfg -Force
          Write-Host "✓ logapi.cfg copied"
        } else {
          Write-Host "⚠ logapi.cfg NOT FOUND - creating placeholder"
          '// LogApi Config' | Out-File -FilePath artifacts\addons\logapi\config\logapi.cfg -Encoding UTF8
        }

        if (Test-Path "LogApi/LogApi.php") {
          Copy-Item "LogApi/LogApi.php" artifacts\addons\logapi\php\LogApi.php -Force
          Write-Host "✓ LogApi.php copied"
        } else {
          Write-Host "⚠ LogApi.php NOT FOUND - creating placeholder"
          '<?php // LogApi PHP Handler ?>' | Out-File -FilePath artifacts\addons\logapi\php\LogApi.php -Encoding UTF8
        }
        
        # Show artifact contents
        Write-Host "=== Final Artifact Contents ==="
        Get-ChildItem -Recurse artifacts\
      shell: pwsh

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: win32
        path: ${{github.workspace}}/artifacts
        retention-days: 30
        if-no-files-found: error

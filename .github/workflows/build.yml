#
# https://github.com/actions/checkout/issues/1590#issuecomment-2567109195
#
# We manually start a container and execute scripts in it instead of using `jobs.build.container`,
# otherwise we couldn't use GitHub-provided actions (checkout, cache, etc.) as they rely on Node20
# which would not necessarily be available on some containers (e.g., Ubuntu 18.04).
#
# See: https://github.com/actions/checkout/issues/1590
#
# If you need to pass environment variables from the GitHub host runner to the Docker container,
# you can do so by adding `-e MY_VAR` to the docker run command, for example:
#
#    docker run --name build-container -d -e GITHUB_REPOSITORY -v ...
#
name: Action Build System
on: [push]
env:
  CONTAINER: ubuntu:18.04

jobs:
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Start Docker Container
      run: |
        docker pull $CONTAINER
        docker run --name build-container -d -v ${{github.workspace}}:/desktop $CONTAINER tail -f /dev/null

    - name: Install Development Tools Packages
      env:
        SCRIPT: |
          # Add i386 architecture
          dpkg --add-architecture i386

          # Update repository
          apt-get update > /dev/null

          # Install build dependencies (without libcurl - we build it statically)
          apt-get install -qq -y pkg-config wget unzip build-essential gcc-multilib g++-multilib \
          libgcc1:i386 zlib1g-dev:i386 > /dev/null
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Build libcurl 32-bit Static
      env:
        SCRIPT: |
          cd /tmp
          wget -q https://curl.se/download/curl-8.7.1.tar.gz
          tar xf curl-8.7.1.tar.gz
          cd curl-8.7.1
          ./configure --host=i686-linux-gnu \
            CFLAGS="-m32" LDFLAGS="-m32" \
            --disable-gssapi \
            --disable-kerberos5 \
            --disable-ntlm \
            --without-gssapi \
            --without-ssl \
            --disable-shared \
            --enable-static \
            --prefix=/usr/local/curl32 \
            --silent
          make -j$(nproc) --silent
          make install --silent
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Execute Build
      env:
        SCRIPT: |
          # Open makefile directory (corrected path)
          cd /desktop
          
          # Clean and build
          make clean
          make

          # Verify build
          echo "=== Build Output ==="
          ls -la Release/
          
          # Make dlls path
          mkdir -p /desktop/publish/addons/logapi/dlls

          # Copy release file
          cp /desktop/Release/logapi_mm.so /desktop/publish/addons/logapi/dlls/logapi_mm.so
          
          # Verify dependencies
          echo "=== Library Dependencies ==="
          ldd /desktop/publish/addons/logapi/dlls/logapi_mm.so || true
      run: docker exec build-container bash -c "$SCRIPT"

    - name: Deploy artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux32
        path: ${{github.workspace}}/publish
        
  windows:
    name: Windows Build
    runs-on: windows-latest
  
    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Execute Build
      working-directory: ${{github.workspace}}
      run: |
        # Open directory
        cd LogApi

        # Make Release directory
        mkdir -p Release

        # Execute Build
        msbuild LogApi.vcxproj -property:configuration=Release -nologo -verbosity:quiet -m

        # Make publish directory
        mkdir -p ..\cstrike\addons\logapi\dlls

        # Copy cstrike files to publish
        copy ..\cstrike\* publish -Recurse -Force

        # Move released dll to publish
        copy Release\*.dll ..\cstrike\addons\logapi\dlls -Recurse -Force

    - name: Deploy artifacts
      uses: actions/upload-artifact@v4
      with:
        name: win32
        path: ${{github.workspace}}\publish
